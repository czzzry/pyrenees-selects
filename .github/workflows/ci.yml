name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: python -m unittest discover -s tests
      - run: python -m compileall -q pyrenees_selects scripts tests
      - run: node --check pyrenees_selects/static/app.js
